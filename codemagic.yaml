# Codemagic CI/CD Yapılandırma Dosyası
# Bu dosya, Codemagic arayüzündeki olası şema/proje yolu hatalarını devre dışı bırakarak
# projeyi doğrudan macOS sunucusunda komut satırıyla derler.

workflows:
  mekanx-workflow:
    name: Mekanx Derleme Akisi
    max_build_duration: 60
    instance_type: mac_mini_m1 # Ücretsiz plandaki standart macOS sunucusu
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Bağımlılıkları Yükle (Pub Get)
        script: |
          flutter pub get
          
      - name: Android APK Derle (Tamamen Ücretsiz Kurulum)
        script: |
          flutter build apk --release
          
      - name: iOS App Derle (Kod İmzalamasız Test Sürümü)
        script: |
          flutter build ios --release --no-codesign
          
    artifacts:
      - build/app/outputs/flutter-apk/*.apk # Telefonunuza yükleyebileceğiniz Android APK dosyası
      - build/ios/iphoneos/*.app # iOS derleme çıktısı (Hatasız derlendiğini kanıtlar)
